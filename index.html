<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RoastMyCode 🔥 — Your Code, Brutally Judged</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="module" id="firebase-init">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window.__firebaseDB = db;
  window.__firebaseHelpers = { collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp };
  window.__firebaseReady = true;
  window.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: #2a2a2a;
    --border2: #3a3a3a;
    --text: #f0f0f0;
    --muted: #888;
    --fire: #ff4500;
    --fire2: #ff6b35;
    --fire3: #ffa500;
    --green: #00ff88;
    --cyan: #00d4ff;
    --red: #ff2d55;
    --yellow: #ffcc00;
    --purple: #bf5fff;
    --mono: 'Space Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'DM Sans', sans-serif;
  }

  html { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; }
  body { background: var(--bg); }
  #root { min-height: 100vh; }

  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 9999;
  }

  /* GLITCH */
  .glitch { position: relative; animation: glitch-skew 1s infinite linear alternate-reverse; }
  .glitch::before, .glitch::after {
    content: attr(data-text);
    position: absolute; top: 0; left: 0; right: 0;
    font-family: var(--display); font-size: inherit; color: inherit;
  }
  .glitch::before { left: 2px; text-shadow: -1px 0 var(--red); clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); animation: glitch-anim 5s infinite linear alternate-reverse; }
  .glitch::after { left: -2px; text-shadow: -1px 0 var(--cyan); clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%); animation: glitch-anim2 5s infinite linear alternate-reverse; }
  @keyframes glitch-anim {
    0%{clip-path:polygon(0 2%,100% 2%,100% 5%,0 5%)} 20%{clip-path:polygon(0 15%,100% 15%,100% 20%,0 20%)}
    40%{clip-path:polygon(0 40%,100% 40%,100% 42%,0 42%)} 60%{clip-path:polygon(0 60%,100% 60%,100% 65%,0 65%)}
    80%{clip-path:polygon(0 80%,100% 80%,100% 84%,0 84%)} 100%{clip-path:polygon(0 95%,100% 95%,100% 99%,0 99%)}
  }
  @keyframes glitch-anim2 {
    0%{clip-path:polygon(0 25%,100% 25%,100% 30%,0 30%)} 20%{clip-path:polygon(0 3%,100% 3%,100% 7%,0 7%)}
    40%{clip-path:polygon(0 55%,100% 55%,100% 60%,0 60%)} 60%{clip-path:polygon(0 70%,100% 70%,100% 75%,0 75%)}
    80%{clip-path:polygon(0 50%,100% 50%,100% 52%,0 52%)} 100%{clip-path:polygon(0 10%,100% 10%,100% 15%,0 15%)}
  }
  @keyframes glitch-skew { 0%{transform:skew(0deg)} 10%{transform:skew(0.3deg)} 20%{transform:skew(-0.3deg)} 100%{transform:skew(0deg)} }

  @keyframes flame { 0%,100%{text-shadow:0 0 10px #ff4500,0 0 20px #ff4500,0 0 40px #ff6b35} 50%{text-shadow:0 0 15px #ffa500,0 0 30px #ff4500,0 0 60px #ff6b35} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 10%{transform:translateX(-4px)} 20%{transform:translateX(4px)} 30%{transform:translateX(-3px)} 40%{transform:translateX(3px)} 50%{transform:translateX(-2px)} 60%{transform:translateX(2px)} }
  @keyframes score-reveal { 0%{transform:scale(0) rotate(-10deg);opacity:0} 60%{transform:scale(1.2) rotate(2deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
  @keyframes bar-fill { from{width:0} to{width:var(--w)} }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }
  @keyframes live-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  @keyframes ticker-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }

  .app { max-width: 960px; margin: 0 auto; padding: 0 20px 80px; animation: fadeUp 0.6s ease; }

  /* TICKER */
  .ticker-wrap { overflow: hidden; white-space: nowrap; background: var(--fire); padding: 8px 0; }
  .ticker { display: inline-block; animation: ticker-scroll 22s linear infinite; font-family: var(--mono); font-size: 11px; font-weight: 700; color: #000; letter-spacing: 1px; text-transform: uppercase; }

  /* HEADER */
  .header { text-align: center; padding: 50px 0 30px; position: relative; }
  .header-badge { display: inline-block; background: var(--fire); color: #000; font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 4px 12px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
  .header h1 { font-family: var(--display); font-size: clamp(60px, 12vw, 110px); line-height: 0.9; letter-spacing: 2px; color: var(--text); animation: flame 2s ease-in-out infinite; margin-bottom: 12px; }
  .header-sub { font-family: var(--mono); font-size: 13px; color: var(--muted); letter-spacing: 1px; }

  /* STATS ROW */
  .stats-row { display: flex; gap: 12px; justify-content: center; margin: 20px 0 0; flex-wrap: wrap; }
  .stat-pill { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-family: var(--mono); font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .stat-pill span { color: var(--fire); font-weight: 700; }

  /* NAV */
  .nav-tabs { display: flex; gap: 2px; margin: 30px 0 0; border-bottom: 1px solid var(--border); }
  .nav-tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: 1px; padding: 10px 20px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; margin-bottom: -1px; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--fire); border-bottom-color: var(--fire); }

  /* MODE TOGGLE */
  .mode-row { display: flex; gap: 8px; margin: 20px 0 12px; align-items: center; }
  .mode-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .mode-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); font-size: 11px; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
  .mode-btn.active { background: var(--fire); border-color: var(--fire); color: #000; font-weight: 700; }

  /* EDITOR */
  .editor-section { padding: 10px 0 30px; }
  .editor-header { display: flex; align-items: center; justify-content: space-between; background: var(--bg3); border: 1px solid var(--border); border-bottom: none; padding: 10px 16px; border-radius: 8px 8px 0 0; }
  .editor-dots { display: flex; gap: 6px; }
  .editor-dot { width: 12px; height: 12px; border-radius: 50%; }
  .editor-dot.red { background: #ff5f57; }
  .editor-dot.yellow { background: #febc2e; }
  .editor-dot.green { background: #28c840; }
  .editor-lang { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .editor-line-count { font-family: var(--mono); font-size: 10px; color: #444; }

  .code-textarea { width: 100%; min-height: 260px; background: var(--bg2); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; color: var(--green); font-family: var(--mono); font-size: 13px; line-height: 1.8; padding: 20px; resize: vertical; outline: none; transition: border-color 0.2s; tab-size: 2; }
  .code-textarea:focus { border-color: var(--fire); }
  .code-textarea::placeholder { color: #333; }

  .controls-row { display: flex; align-items: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .lang-select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 10px 14px; border-radius: 6px; cursor: pointer; outline: none; transition: border-color 0.2s; }
  .lang-select:focus { border-color: var(--fire); }

  .roast-btn { flex: 1; background: var(--fire); border: none; color: #000; font-family: var(--display); font-size: 22px; letter-spacing: 2px; padding: 12px 32px; border-radius: 6px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; min-width: 180px; }
  .roast-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.4s; }
  .roast-btn:hover::before { left: 100%; }
  .roast-btn:hover { background: var(--fire2); transform: translateY(-1px); }
  .roast-btn:active { transform: translateY(0) scale(0.99); animation: shake 0.3s; }
  .roast-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

  .char-count { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }

  /* LOADING */
  .loading-container { text-align: center; padding: 60px 20px; animation: fadeUp 0.4s ease; }
  .fire-loader { font-size: 60px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 20px; }
  .loading-text { font-family: var(--display); font-size: 32px; color: var(--fire); letter-spacing: 3px; margin-bottom: 8px; }
  .loading-sub { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .loading-dots::after { content: ''; animation: dots 1.4s infinite; }

  /* RESULT TABS */
  .result-tabs { display: flex; gap: 4px; margin: 24px 0 0; border-bottom: 1px solid var(--border); }
  .result-tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: var(--mono); font-size: 11px; padding: 8px 16px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; margin-bottom: -1px; }
  .result-tab.active { color: var(--fire); border-bottom-color: var(--fire); }
  .result-tab:hover { color: var(--text); }

  /* ROAST RESULT */
  .roast-result { animation: fadeUp 0.5s ease; margin-top: 4px; }

  /* SCORE BANNER */
  .score-banner { display: flex; align-items: center; gap: 20px; background: var(--bg2); border: 1px solid var(--border); border-left: 4px solid var(--fire); padding: 20px 24px; border-radius: 8px; margin-bottom: 16px; flex-wrap: wrap; margin-top: 16px; }
  .score-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid; flex-shrink: 0; animation: score-reveal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both; }
  .score-circle.terrible { border-color: var(--red); }
  .score-circle.bad { border-color: var(--fire); }
  .score-circle.meh { border-color: var(--yellow); }
  .score-circle.ok { border-color: var(--green); }
  .score-number { font-family: var(--display); font-size: 32px; line-height: 1; color: var(--text); }
  .score-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 1px; }
  .score-meta { flex: 1; min-width: 200px; }
  .score-verdict { font-family: var(--display); font-size: 28px; letter-spacing: 1px; color: var(--fire); margin-bottom: 4px; }
  .score-lang { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .score-tags { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .score-tag { background: var(--bg3); border: 1px solid var(--border2); color: var(--muted); font-family: var(--mono); font-size: 10px; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px; }
  .score-tag.bad { border-color: var(--red); color: var(--red); }

  /* METRICS BAR */
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .metric-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .metric-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .metric-value { font-family: var(--display); font-size: 28px; line-height: 1; margin-bottom: 8px; }
  .metric-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .metric-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
  .metric-bar-fill.green { background: var(--green); }
  .metric-bar-fill.yellow { background: var(--yellow); }
  .metric-bar-fill.orange { background: var(--fire2); }
  .metric-bar-fill.red { background: var(--red); }
  .metric-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; }

  /* ROAST CARD */
  .roast-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; transition: border-color 0.2s; }
  .roast-card:hover { border-color: var(--border2); }
  .roast-card-header { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg3); }
  .roast-card-icon { font-size: 18px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); }
  .roast-card-title { font-family: var(--mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .roast-card-body { padding: 20px; }

  /* DESCRIPTION CARD */
  .desc-what { font-family: var(--mono); font-size: 11px; color: var(--cyan); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .desc-text { font-size: 15px; line-height: 1.7; color: var(--text); margin-bottom: 16px; }
  .desc-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .desc-tag { background: rgba(0,212,255,0.07); border: 1px solid rgba(0,212,255,0.2); color: var(--cyan); font-family: var(--mono); font-size: 10px; padding: 3px 10px; border-radius: 20px; }

  /* COMPLEXITY */
  .complexity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .complexity-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 14px; }
  .complexity-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .complexity-value { font-family: var(--display); font-size: 22px; margin-bottom: 4px; }
  .complexity-explain { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .complexity-value.green { color: var(--green); }
  .complexity-value.yellow { color: var(--yellow); }
  .complexity-value.red { color: var(--red); }

  /* ROAST TEXT */
  .roast-text { font-family: var(--body); font-size: 15px; line-height: 1.7; color: var(--text); }
  .roast-text.comedian { font-size: 17px; line-height: 1.8; color: var(--fire2); font-style: italic; border-left: 3px solid var(--fire); padding-left: 16px; }

  /* FIXES */
  .fix-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .fix-item:last-child { border-bottom: none; }
  .fix-num { font-family: var(--mono); font-size: 11px; color: var(--fire); width: 20px; flex-shrink: 0; padding-top: 2px; }
  .fix-text { font-size: 14px; line-height: 1.6; color: var(--text); }
  .fix-text strong { color: var(--yellow); font-weight: 600; }

  /* CODE SNIPPET */
  .code-snippet { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; font-family: var(--mono); font-size: 12px; line-height: 1.7; color: var(--green); overflow-x: auto; margin-top: 12px; white-space: pre; position: relative; }
  .copy-snippet-btn { position: absolute; top: 8px; right: 8px; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
  .copy-snippet-btn:hover { border-color: var(--fire); color: var(--fire); }

  /* SECURITY */
  .security-item { display: flex; gap: 12px; padding: 12px; background: var(--bg3); border-radius: 6px; margin-bottom: 8px; border-left: 3px solid var(--red); }
  .security-item.warn { border-left-color: var(--yellow); }
  .security-item.info { border-left-color: var(--cyan); }
  .security-badge { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 1px; padding: 2px 8px; border-radius: 3px; height: fit-content; flex-shrink: 0; margin-top: 2px; }
  .security-badge.crit { background: rgba(255,45,85,0.15); color: var(--red); border: 1px solid rgba(255,45,85,0.3); }
  .security-badge.warn { background: rgba(255,204,0,0.1); color: var(--yellow); border: 1px solid rgba(255,204,0,0.25); }
  .security-badge.info { background: rgba(0,212,255,0.07); color: var(--cyan); border: 1px solid rgba(0,212,255,0.2); }

  /* SHARE */
  .share-section { margin-top: 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .share-title { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 14px; }
  .share-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
  .share-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 9px 18px; border-radius: 6px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
  .share-btn:hover { border-color: var(--fire); color: var(--fire); }
  .add-to-lb-btn { background: var(--fire); border: none; color: #000; font-family: var(--display); font-size: 16px; letter-spacing: 1px; padding: 9px 20px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .add-to-lb-btn:hover { background: var(--fire2); }
  .nick-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .nick-input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 9px 14px; border-radius: 6px; outline: none; transition: border-color 0.2s; flex: 1; max-width: 240px; }
  .nick-input:focus { border-color: var(--fire); }
  .nick-input::placeholder { color: #444; }

  /* SHARE CARD PREVIEW */
  .share-card-preview { background: #0a0a0a; border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-top: 16px; position: relative; overflow: hidden; }
  .share-card-preview::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--fire), var(--fire3), var(--fire2)); }
  .share-card-brand { font-family: var(--display); font-size: 14px; letter-spacing: 2px; color: var(--fire); margin-bottom: 16px; }
  .share-card-score-big { font-family: var(--display); font-size: 72px; line-height: 1; color: var(--text); margin-bottom: 4px; }
  .share-card-verdict-big { font-family: var(--mono); font-size: 16px; color: var(--fire); margin-bottom: 16px; }
  .share-card-roast-snippet { font-size: 14px; font-style: italic; color: var(--muted); line-height: 1.6; border-left: 2px solid var(--fire); padding-left: 12px; }
  .share-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .share-card-url { font-family: var(--mono); font-size: 10px; color: var(--border2); }
  .share-card-lang { font-family: var(--mono); font-size: 10px; color: var(--border2); background: var(--bg3); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); }

  /* LEADERBOARD */
  .lb-section { padding: 30px 0; }
  .lb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .lb-title { font-family: var(--display); font-size: 36px; letter-spacing: 2px; color: var(--text); }
  .lb-count { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .lb-empty { text-align: center; padding: 60px 20px; border: 1px dashed var(--border); border-radius: 8px; }
  .lb-empty-icon { font-size: 48px; margin-bottom: 12px; }
  .lb-empty-text { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .lb-item { display: grid; grid-template-columns: 40px 1fr auto; gap: 16px; align-items: center; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-bottom: 8px; transition: all 0.2s; cursor: pointer; }
  .lb-item:hover { border-color: var(--fire); transform: translateX(4px); }
  .lb-item.rank-1 { border-left: 3px solid var(--yellow); }
  .lb-item.rank-2 { border-left: 3px solid #c0c0c0; }
  .lb-item.rank-3 { border-left: 3px solid #cd7f32; }
  .lb-rank { font-family: var(--display); font-size: 24px; color: var(--muted); text-align: center; }
  .lb-rank.rank-1 { color: var(--yellow); }
  .lb-rank.rank-2 { color: #c0c0c0; }
  .lb-rank.rank-3 { color: #cd7f32; }
  .lb-info { min-width: 0; }
  .lb-name { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lb-snippet { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lb-timestamp { font-family: var(--mono); font-size: 10px; color: #444; margin-top: 2px; }
  .lb-nick { font-family: var(--mono); font-size: 12px; color: var(--fire2); font-weight: 700; }
  .lb-score { text-align: right; flex-shrink: 0; }
  .lb-score-num { font-family: var(--display); font-size: 30px; line-height: 1; }
  .lb-score-num.terrible { color: var(--red); }
  .lb-score-num.bad { color: var(--fire); }
  .lb-score-num.meh { color: var(--yellow); }
  .lb-score-num.ok { color: var(--green); }
  .lb-score-label { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* HOW IT WORKS */
  .how-section { padding: 30px 0; }
  .how-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 20px; }
  .how-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 24px; transition: border-color 0.2s; }
  .how-card:hover { border-color: var(--fire); }
  .how-step { font-family: var(--display); font-size: 48px; color: var(--fire); line-height: 1; margin-bottom: 12px; opacity: 0.5; }
  .how-card-title { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .how-card-desc { font-size: 14px; color: var(--muted); line-height: 1.6; }

  /* SECTION HEADING */
  .section-heading { font-family: var(--display); font-size: 32px; letter-spacing: 2px; color: var(--text); margin-bottom: 6px; }
  .section-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 24px; }
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

  /* LIVE BADGE */
  .live-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.25); color: var(--green); font-family: var(--mono); font-size: 10px; padding: 3px 10px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: live-pulse 1.4s ease-in-out infinite; }

  /* TOAST */
  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--bg3); border: 1px solid var(--fire); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 12px 20px; border-radius: 6px; z-index: 1000; animation: fadeUp 0.3s ease; max-width: 300px; }

  /* ERROR */
  .error-card { background: rgba(255,45,85,0.05); border: 1px solid rgba(255,45,85,0.3); border-radius: 8px; padding: 20px; margin-top: 16px; animation: fadeUp 0.3s ease; }
  .error-title { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .error-msg { font-size: 14px; color: var(--muted); }

  /* HIGHLIGHT specific score colors */
  .color-green { color: var(--green); }
  .color-yellow { color: var(--yellow); }
  .color-orange { color: var(--fire2); }
  .color-red { color: var(--red); }
  .color-cyan { color: var(--cyan); }
  .color-purple { color: var(--purple); }

  @media(max-width:600px) {
    .header h1 { font-size: 60px; }
    .controls-row { flex-direction: column; }
    .roast-btn { width: 100%; }
    .lb-item { grid-template-columns: 30px 1fr auto; gap: 10px; }
    .complexity-grid { grid-template-columns: 1fr; }
    .metrics-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SAMPLE_CODE = {
  python: `def find_user(users, id):
    for i in range(len(users)):
        for j in range(len(users)):
            if users[i]['id'] == id:
                return users[i]
    return None

password = "admin123"
db_url = "postgres://admin:password123@localhost/prod"

result = find_user(users, id)
if result != None:
    print("Found: " + str(result))`,
  javascript: `var x = 1
var y = 2
var z = x + y
console.log("result is: " + z)

function doStuff(a,b,c,d,e,f,g) {
  if(a==true) {
    if(b==true) {
      if(c==true) {
        return a+b+c+d+e+f+g
      }
    }
  }
}`,
  java: `public class Main {
    public static void main(String[] args) {
        int[] arr = new int[10];
        for(int i=0; i<=10; i++) {
            arr[i] = i * 2;
        }
        String result = "";
        for(int i=0; i<arr.length; i++) {
            result = result + arr[i] + ",";
        }
        System.out.println(result);
    }
}`,
};

const VERDICTS = {
  terrible: ['CATASTROPHIC', 'UNHINGED', 'CRIME SCENE', 'DUMPSTER FIRE', 'HELP ME'],
  bad: ['ROUGH', 'YIKES', 'NEEDS WORK', 'OH NO', 'SERIOUSLY?'],
  meh: ['AVERAGE', 'MEDIOCRE', 'FINE I GUESS', 'COULD BE WORSE'],
  ok: ['ACCEPTABLE', 'NOT BAD', 'DECENT', 'PASSABLE'],
};

function getScoreClass(score) {
  if (score <= 25) return 'terrible';
  if (score <= 50) return 'bad';
  if (score <= 75) return 'meh';
  return 'ok';
}

function getRandomVerdict(scoreClass) {
  const arr = VERDICTS[scoreClass];
  return arr[Math.floor(Math.random() * arr.length)];
}

function getMetricColor(val, high=80, mid=50) {
  if (val >= high) return 'green';
  if (val >= mid) return 'yellow';
  if (val >= 30) return 'orange';
  return 'red';
}

function getMetricColorInverse(val, bad=70, warn=40) {
  if (val >= bad) return 'red';
  if (val >= warn) return 'orange';
  if (val >= 20) return 'yellow';
  return 'green';
}

const TICKER_TEXT = '🔥 ROAST MY CODE · YOUR CODE IS TERRIBLE · WE WILL JUDGE YOU · NO MERCY · DEPLOY THE SHAME · CODE REVIEW INCOMING · SECURITY BREACH DETECTED · O(N³) DETECTED · ';

const SYSTEM_PROMPT = `You are a brutally funny, savage code roaster — think Gordon Ramsay meets a senior engineer. You roast code like a stand-up comedian WHILE being genuinely helpful. Find every flaw: bad naming, security holes, performance issues, anti-patterns, spaghetti logic, complexity nightmares.

ALWAYS respond with ONLY valid JSON, no markdown, no backticks. Format exactly:
{
  "score": <number 1-100>,
  "roast": "<2-3 sentences of savage comedian roast. Be FUNNY, brutal, creative. Reference specific bad code.>",
  "description": {
    "what_it_does": "<1-2 sentences explaining what the code actually does in plain English>",
    "how_it_works": "<2-3 sentences explaining the approach/logic used>",
    "patterns_used": ["<pattern1>", "<pattern2>"],
    "domain": "<e.g. data processing, web, algorithm, utility, etc>"
  },
  "metrics": {
    "readability": <0-100>,
    "maintainability": <0-100>,
    "performance": <0-100>,
    "security": <0-100>,
    "testability": <0-100>
  },
  "complexity": {
    "time_complexity": "<e.g. O(n²)>",
    "space_complexity": "<e.g. O(1)>",
    "time_explanation": "<why this complexity>",
    "space_explanation": "<why this space usage>",
    "cognitive_load": <1-10>,
    "cognitive_explanation": "<why this cognitive load score>"
  },
  "issues": [
    {"title": "<issue name>", "description": "<what's wrong and why it's bad>", "severity": "critical|warning|info"},
    ...
  ],
  "security_issues": [
    {"title": "<vuln name>", "description": "<risk and impact>", "severity": "critical|warning|info"},
    ...
  ],
  "fixes": [
    {"what": "<specific thing to fix>", "how": "<concrete suggestion>"},
    ...
  ],
  "redeeming": "<one thing they did right, or a backhanded compliment>",
  "fixed_snippet": "<improved version of most broken part, or empty string>"
}`;

function MetricBar({ label, value, inverse=false }) {
  const color = inverse ? getMetricColorInverse(value) : getMetricColor(value);
  return (
    <div className="metric-card">
      <div className="metric-label">{label}</div>
      <div className={`metric-value color-${color}`}>{value}</div>
      <div className="metric-bar">
        <div className={`metric-bar-fill ${color}`} style={{width: `${value}%`}} />
      </div>
      <div className="metric-sub">/100</div>
    </div>
  );
}

function CopyButton({ text, label="Copy" }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };
  return <button className="copy-snippet-btn" onClick={copy}>{copied ? '✓ Copied' : label}</button>;
}

function App() {
  const [tab, setTab] = useState('roast');
  const [code, setCode] = useState('');
  const [lang, setLang] = useState('python');
  const [loading, setLoading] = useState(false);
  const [roastData, setRoastData] = useState(null);
  const [error, setError] = useState(null);
  const [leaderboard, setLeaderboard] = useState([]);
  const [toast, setToast] = useState(null);
  const [showShareCard, setShowShareCard] = useState(false);
  const [nickname, setNickname] = useState('');
  const [fbReady, setFbReady] = useState(false);
  const [lbLoading, setLbLoading] = useState(true);
  const [resultTab, setResultTab] = useState('roast');
  const [totalRoasts, setTotalRoasts] = useState(1337);

  useEffect(() => {
    const init = () => {
      setFbReady(true);
      const db = window.__firebaseDB;
      const { collection, query, orderBy, limit, onSnapshot } = window.__firebaseHelpers;
      const q = query(collection(db, 'roasts'), orderBy('score', 'asc'), limit(20));
      const unsub = onSnapshot(q, (snap) => {
        const entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        setLeaderboard(entries);
        setTotalRoasts(Math.max(1337, entries.length * 17 + 800));
        setLbLoading(false);
      }, () => {
        setLbLoading(false);
        try { const saved = localStorage.getItem('roastmycode_lb'); if (saved) setLeaderboard(JSON.parse(saved)); } catch(e) {}
      });
      return unsub;
    };
    let unsub;
    if (window.__firebaseReady) { unsub = init(); }
    else {
      window.addEventListener('firebase-ready', () => { unsub = init(); }, { once: true });
      const timer = setTimeout(() => {
        setLbLoading(false);
        try { const saved = localStorage.getItem('roastmycode_lb'); if (saved) setLeaderboard(JSON.parse(saved)); } catch(e) {}
      }, 3000);
      return () => clearTimeout(timer);
    }
    return () => unsub?.();
  }, []);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

  const saveToFirebase = async (entry) => {
    try {
      if (window.__firebaseDB) {
        const { collection, addDoc, serverTimestamp } = window.__firebaseHelpers;
        await addDoc(collection(window.__firebaseDB, 'roasts'), { ...entry, timestamp: serverTimestamp() });
        return true;
      }
    } catch(e) {}
    const newLb = [entry, ...leaderboard].sort((a,b) => a.score - b.score).slice(0, 20);
    setLeaderboard(newLb);
    try { localStorage.setItem('roastmycode_lb', JSON.stringify(newLb)); } catch(e) {}
    return false;
  };

  const handleRoast = async () => {
    if (!code.trim()) { showToast('Paste some code first!'); return; }
    setLoading(true);
    setRoastData(null);
    setError(null);
    setShowShareCard(false);
    setResultTab('roast');

    try {
      const resp = await fetch('/api/roast', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          max_tokens: 1500,
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: `Language: ${lang}\n\nCode to roast:\n\`\`\`${lang}\n${code}\n\`\`\`` }]
        })
      });
      const data = await resp.json();
      if (!resp.ok || data.error) { setError('API Error: ' + (data.error || `HTTP ${resp.status}`)); setLoading(false); return; }
      const raw = data.content?.[0]?.text || '';
      if (!raw) { setError('Empty response. Check your API key in Vercel env vars.'); setLoading(false); return; }
      const clean = raw.replace(/```json[\s\S]*?```|```/g, '').trim();
      const parsed = JSON.parse(clean);
      const scoreClass = getScoreClass(parsed.score);
      setRoastData({ ...parsed, scoreClass, verdict: getRandomVerdict(scoreClass) });
      setTotalRoasts(n => n + 1);
    } catch(e) {
      setError('Roaster crashed: ' + e.message);
    }
    setLoading(false);
  };

  const addToLeaderboard = async () => {
    if (!roastData) return;
    const entry = { score: roastData.score, scoreClass: roastData.scoreClass, verdict: roastData.verdict, lang, nick: nickname.trim() || 'Anonymous Dev', snippet: code.slice(0, 80).replace(/\n/g, ' '), roast: roastData.roast, dateStr: new Date().toLocaleDateString() };
    const wentToFirebase = await saveToFirebase(entry);
    showToast(wentToFirebase ? '🔥 Shame deployed globally!' : '💀 Added to local Hall of Shame!');
    setTab('leaderboard');
  };

  const copyRoast = () => {
    if (!roastData) return;
    const text = `🔥 ROASTMYCODE REPORT\n\nScore: ${roastData.score}/100 — ${roastData.verdict}\n\n"${roastData.roast}"\n\nComplexity: ${roastData.complexity?.time_complexity} time, ${roastData.complexity?.space_complexity} space\n\nRoast your code at RoastMyCode`;
    navigator.clipboard.writeText(text).then(() => showToast('Roast copied!'));
  };

  const lineCount = code.split('\n').length;

  return (
    <div className="app">
      <div className="ticker-wrap">
        <span className="ticker">{TICKER_TEXT}{TICKER_TEXT}{TICKER_TEXT}</span>
      </div>

      <div className="header">
        <div className="header-badge">⚡ AI-POWERED CODE SHAMING</div>
        <h1 className="glitch" data-text="ROASTMYCODE">ROASTMYCODE</h1>
        <p className="header-sub">paste code → get destroyed → understand it → fix it → repeat</p>
        <div className="stats-row">
          <div className="stat-pill">🔥 <span>{totalRoasts.toLocaleString()}</span> roasts served</div>
          <div className="stat-pill">💀 <span>{leaderboard.length}</span> in hall of shame</div>
          <div className="stat-pill">🌍 <span>{fbReady ? 'LIVE' : 'LOCAL'}</span> leaderboard</div>
        </div>
      </div>

      <div className="nav-tabs">
        {['roast','leaderboard','howto'].map(t => (
          <button key={t} className={`nav-tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            {t==='roast'?'🔥 Roast It':t==='leaderboard'?'💀 Hall of Shame':'❓ How It Works'}
          </button>
        ))}
      </div>

      {tab === 'roast' && (
        <div className="editor-section">
          <div className="editor-header">
            <div className="editor-dots">
              <div className="editor-dot red" /><div className="editor-dot yellow" /><div className="editor-dot green" />
            </div>
            <div className="editor-lang">{lang.toUpperCase()} · READY FOR JUDGMENT</div>
            <div className="editor-line-count">{lineCount} lines</div>
          </div>
          <textarea
            className="code-textarea"
            placeholder={`# Paste your ${lang} code here...\n# The more terrible, the better.\n# We don't judge. Well, actually we do. Brutally.`}
            value={code}
            onChange={e=>setCode(e.target.value)}
            spellCheck={false}
          />
          <div className="controls-row">
            <select className="lang-select" value={lang} onChange={e=>{setLang(e.target.value);setCode('');}}>
              <option value="python">Python</option>
              <option value="javascript">JavaScript</option>
              <option value="java">Java</option>
              <option value="cpp">C++</option>
              <option value="c">C</option>
              <option value="typescript">TypeScript</option>
              <option value="go">Go</option>
              <option value="rust">Rust</option>
              <option value="php">PHP</option>
              <option value="ruby">Ruby</option>
              <option value="swift">Swift</option>
              <option value="kotlin">Kotlin</option>
            </select>
            <button className="share-btn" onClick={()=>setCode(SAMPLE_CODE[lang]||SAMPLE_CODE.python)}>Load Sample 💀</button>
            <button className="roast-btn" onClick={handleRoast} disabled={loading || !code.trim()}>
              {loading ? 'ROASTING...' : '🔥 ROAST IT'}
            </button>
            <span className="char-count">{code.length} chars</span>
          </div>

          {loading && (
            <div className="loading-container">
              <div className="fire-loader">🔥</div>
              <div className="loading-text">ANALYZING YOUR CRIMES<span className="loading-dots" /></div>
              <div className="loading-sub">Running complexity analysis · security scan · shame assessment...</div>
            </div>
          )}

          {error && (
            <div className="error-card">
              <div className="error-title">⚠ ROASTER MALFUNCTION</div>
              <div className="error-msg">{error}</div>
            </div>
          )}

          {roastData && !loading && (
            <div className="roast-result">
              {/* Score Banner */}
              <div className="score-banner">
                <div className={`score-circle ${roastData.scoreClass}`}>
                  <span className="score-number">{roastData.score}</span>
                  <span className="score-label">/100</span>
                </div>
                <div className="score-meta">
                  <div className="score-verdict">{roastData.verdict}</div>
                  <div className="score-lang">{lang.toUpperCase()} · {lineCount} lines · {code.length} chars</div>
                  <div className="score-tags">
                    {roastData.complexity && (
                      <>
                        <span className="score-tag">⏱ {roastData.complexity.time_complexity}</span>
                        <span className="score-tag">💾 {roastData.complexity.space_complexity}</span>
                      </>
                    )}
                    {roastData.issues?.filter(i=>i.severity==='critical').length > 0 && (
                      <span className="score-tag bad">🔴 {roastData.issues.filter(i=>i.severity==='critical').length} critical</span>
                    )}
                    {roastData.description?.domain && (
                      <span className="score-tag">📂 {roastData.description.domain}</span>
                    )}
                  </div>
                </div>
              </div>

              {/* Result Sub-tabs */}
              <div className="result-tabs">
                {[
                  {id:'roast', label:'🔥 Roast'},
                  {id:'description', label:'📖 Description'},
                  {id:'complexity', label:'📊 Analysis'},
                  {id:'security', label:'🔒 Security'},
                  {id:'fixes', label:'🔧 Fixes'},
                ].map(t => (
                  <button key={t.id} className={`result-tab ${resultTab===t.id?'active':''}`} onClick={()=>setResultTab(t.id)}>
                    {t.label}
                  </button>
                ))}
              </div>

              {/* ROAST TAB */}
              {resultTab === 'roast' && (
                <>
                  <div className="roast-card" style={{marginTop:16}}>
                    <div className="roast-card-header">
                      <div className="roast-card-icon">🎤</div>
                      <div className="roast-card-title">The Roast</div>
                    </div>
                    <div className="roast-card-body">
                      <div className="roast-text comedian">{roastData.roast}</div>
                    </div>
                  </div>

                  {/* Metrics */}
                  <div className="metrics-grid">
                    <MetricBar label="Readability" value={roastData.metrics?.readability ?? 50} />
                    <MetricBar label="Maintainability" value={roastData.metrics?.maintainability ?? 50} />
                    <MetricBar label="Performance" value={roastData.metrics?.performance ?? 50} />
                    <MetricBar label="Security" value={roastData.metrics?.security ?? 50} />
                    <MetricBar label="Testability" value={roastData.metrics?.testability ?? 50} />
                  </div>

                  {roastData.redeeming && (
                    <div className="roast-card">
                      <div className="roast-card-header">
                        <div className="roast-card-icon">🌟</div>
                        <div className="roast-card-title">One Good Thing (Barely)</div>
                      </div>
                      <div className="roast-card-body">
                        <div className="roast-text" style={{color:'var(--green)',fontStyle:'italic'}}>{roastData.redeeming}</div>
                      </div>
                    </div>
                  )}
                </>
              )}

              {/* DESCRIPTION TAB */}
              {resultTab === 'description' && roastData.description && (
                <div style={{marginTop:16}}>
                  <div className="roast-card">
                    <div className="roast-card-header">
                      <div className="roast-card-icon">🧠</div>
                      <div className="roast-card-title">What This Code Does</div>
                    </div>
                    <div className="roast-card-body">
                      <div className="desc-what">Purpose</div>
                      <div className="desc-text">{roastData.description.what_it_does}</div>
                      <div className="desc-what">How It Works</div>
                      <div className="desc-text">{roastData.description.how_it_works}</div>
                      {roastData.description.patterns_used?.length > 0 && (
                        <>
                          <div className="desc-what">Patterns & Concepts</div>
                          <div className="desc-tags">
                            {roastData.description.patterns_used.map((p,i) => (
                              <span key={i} className="desc-tag">{p}</span>
                            ))}
                          </div>
                        </>
                      )}
                    </div>
                  </div>

                  {/* Metrics full view in description tab */}
                  <div className="roast-card">
                    <div className="roast-card-header">
                      <div className="roast-card-icon">📊</div>
                      <div className="roast-card-title">Code Quality Scores</div>
                    </div>
                    <div className="roast-card-body">
                      <div className="metrics-grid" style={{marginBottom:0}}>
                        <MetricBar label="Readability" value={roastData.metrics?.readability ?? 50} />
                        <MetricBar label="Maintainability" value={roastData.metrics?.maintainability ?? 50} />
                        <MetricBar label="Performance" value={roastData.metrics?.performance ?? 50} />
                        <MetricBar label="Security" value={roastData.metrics?.security ?? 50} />
                        <MetricBar label="Testability" value={roastData.metrics?.testability ?? 50} />
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* COMPLEXITY TAB */}
              {resultTab === 'complexity' && roastData.complexity && (
                <div style={{marginTop:16}}>
                  <div className="roast-card">
                    <div className="roast-card-header">
                      <div className="roast-card-icon">⚡</div>
                      <div className="roast-card-title">Complexity Analysis</div>
                    </div>
                    <div className="roast-card-body">
                      <div className="complexity-grid">
                        <div className="complexity-item">
                          <div className="complexity-label">Time Complexity</div>
                          <div className={`complexity-value ${
                            roastData.complexity.time_complexity?.includes('n²') || roastData.complexity.time_complexity?.includes('n³') ? 'red' :
                            roastData.complexity.time_complexity?.includes('n log') ? 'yellow' : 'green'
                          }`}>{roastData.complexity.time_complexity}</div>
                          <div className="complexity-explain">{roastData.complexity.time_explanation}</div>
                        </div>
                        <div className="complexity-item">
                          <div className="complexity-label">Space Complexity</div>
                          <div className={`complexity-value ${
                            roastData.complexity.space_complexity?.includes('n²') ? 'red' :
                            roastData.complexity.space_complexity?.includes('O(n)') ? 'yellow' : 'green'
                          }`}>{roastData.complexity.space_complexity}</div>
                          <div className="complexity-explain">{roastData.complexity.space_explanation}</div>
                        </div>
                      </div>

                      {roastData.complexity.cognitive_load !== undefined && (
                        <div style={{marginTop:16}}>
                          <div className="complexity-label" style={{marginBottom:8}}>Cognitive Load Score</div>
                          <div style={{display:'flex',alignItems:'center',gap:16}}>
                            <div style={{fontFamily:'var(--display)',fontSize:'48px'}} className={`color-${
                              roastData.complexity.cognitive_load >= 8 ? 'red' :
                              roastData.complexity.cognitive_load >= 6 ? 'orange' :
                              roastData.complexity.cognitive_load >= 4 ? 'yellow' : 'green'
                            }`}>{roastData.complexity.cognitive_load}<span style={{fontSize:'20px',color:'var(--muted)'}}>/10</span></div>
                            <div style={{flex:1}}>
                              <div className="metric-bar" style={{marginBottom:8}}>
                                <div className={`metric-bar-fill ${
                                  roastData.complexity.cognitive_load >= 8 ? 'red' :
                                  roastData.complexity.cognitive_load >= 6 ? 'orange' :
                                  roastData.complexity.cognitive_load >= 4 ? 'yellow' : 'green'
                                }`} style={{width:`${roastData.complexity.cognitive_load*10}%`}} />
                              </div>
                              <div style={{fontSize:'13px',color:'var(--muted)',lineHeight:1.6}}>{roastData.complexity.cognitive_explanation}</div>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>

                  {roastData.fixed_snippet && (
                    <div className="roast-card">
                      <div className="roast-card-header">
                        <div className="roast-card-icon">✨</div>
                        <div className="roast-card-title">Optimized Version</div>
                      </div>
                      <div className="roast-card-body">
                        <div className="code-snippet" style={{position:'relative'}}>
                          <CopyButton text={roastData.fixed_snippet} label="📋 Copy" />
                          {roastData.fixed_snippet}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* SECURITY TAB */}
              {resultTab === 'security' && (
                <div style={{marginTop:16}}>
                  <div className="roast-card">
                    <div className="roast-card-header">
                      <div className="roast-card-icon">🔒</div>
                      <div className="roast-card-title">
                        Security Scan — {roastData.security_issues?.length ?? 0} issue{roastData.security_issues?.length !== 1 ? 's' : ''} found
                      </div>
                    </div>
                    <div className="roast-card-body">
                      {(!roastData.security_issues || roastData.security_issues.length === 0) ? (
                        <div style={{textAlign:'center',padding:'20px',color:'var(--green)',fontFamily:'var(--mono)',fontSize:'14px'}}>
                          ✅ No security issues detected. Surprising.
                        </div>
                      ) : (
                        roastData.security_issues.map((issue, i) => (
                          <div key={i} className={`security-item ${issue.severity === 'warning' ? 'warn' : issue.severity === 'info' ? 'info' : ''}`}>
                            <span className={`security-badge ${issue.severity === 'critical' ? 'crit' : issue.severity === 'warning' ? 'warn' : 'info'}`}>
                              {issue.severity}
                            </span>
                            <div>
                              <div style={{fontFamily:'var(--mono)',fontSize:'13px',fontWeight:'700',marginBottom:'4px',color:'var(--text)'}}>{issue.title}</div>
                              <div style={{fontSize:'13px',color:'var(--muted)',lineHeight:1.6}}>{issue.description}</div>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                  <div className="roast-card">
                    <div className="roast-card-header">
                      <div className="roast-card-icon">🐛</div>
                      <div className="roast-card-title">Code Issues ({roastData.issues?.length ?? 0})</div>
                    </div>
                    <div className="roast-card-body">
                      {roastData.issues?.map((issue, i) => (
                        <div key={i} className="fix-item">
                          <div className="fix-num">{issue.severity==='critical'?'🔴':issue.severity==='warning'?'🟡':'🔵'}</div>
                          <div className="fix-text">
                            <strong>{issue.title}</strong><br />{issue.description}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* FIXES TAB */}
              {resultTab === 'fixes' && (
                <div style={{marginTop:16}}>
                  {roastData.fixes?.length > 0 && (
                    <div className="roast-card">
                      <div className="roast-card-header">
                        <div className="roast-card-icon">🔧</div>
                        <div className="roast-card-title">How To Fix Your Mess ({roastData.fixes.length} fixes)</div>
                      </div>
                      <div className="roast-card-body">
                        {roastData.fixes.map((fix, i) => (
                          <div key={i} className="fix-item">
                            <div className="fix-num">{i+1}.</div>
                            <div className="fix-text">
                              <strong>{fix.what}</strong><br />{fix.how}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {roastData.fixed_snippet && (
                    <div className="roast-card">
                      <div className="roast-card-header">
                        <div className="roast-card-icon">✨</div>
                        <div className="roast-card-title">What It Should Look Like</div>
                      </div>
                      <div className="roast-card-body">
                        <div className="code-snippet" style={{position:'relative'}}>
                          <CopyButton text={roastData.fixed_snippet} label="📋 Copy" />
                          {roastData.fixed_snippet}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* SHARE SECTION — always visible */}
              <div className="share-section">
                <div className="share-title">📤 Deploy The Shame</div>
                <div className="share-buttons">
                  <button className="share-btn" onClick={copyRoast}>📋 Copy Roast</button>
                  <button className="share-btn" onClick={()=>setShowShareCard(s=>!s)}>🎴 Share Card</button>
                  <button className="add-to-lb-btn" onClick={addToLeaderboard}>💀 Add To Hall of Shame</button>
                </div>
                <div className="nick-row">
                  <input className="nick-input" placeholder="Your nickname (e.g. 10x_dev_lol)" value={nickname} onChange={e=>setNickname(e.target.value)} maxLength={24} />
                  <span style={{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--muted)'}}>signs your entry on the global board</span>
                </div>
                {showShareCard && (
                  <div className="share-card-preview">
                    <div className="share-card-brand">🔥 ROASTMYCODE</div>
                    <div className="share-card-score-big">{roastData.score}</div>
                    <div className="share-card-verdict-big">{roastData.verdict}</div>
                    <div style={{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--muted)',marginBottom:'8px'}}>
                      ⏱ {roastData.complexity?.time_complexity} · 💾 {roastData.complexity?.space_complexity}
                    </div>
                    <div className="share-card-roast-snippet">"{roastData.roast?.slice(0,150)}{roastData.roast?.length>150?'...':''}"</div>
                    <div className="share-card-footer">
                      <span className="share-card-url">roastmycode.vercel.app</span>
                      <span className="share-card-lang">{lang.toUpperCase()}</span>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {tab === 'leaderboard' && (
        <div className="lb-section">
          <div className="lb-header">
            <div>
              <div className="lb-title">💀 HALL OF SHAME</div>
              <div className="lb-count">{leaderboard.length} submissions · sorted by score (lowest = worst)</div>
            </div>
            <div className="live-badge">
              <div className="live-dot" />
              {fbReady ? 'LIVE · GLOBAL' : 'LOCAL'}
            </div>
          </div>
          {lbLoading ? (
            <div className="lb-empty"><div className="lb-empty-icon" style={{animation:'spin 1s linear infinite',display:'inline-block'}}>🔥</div><div className="lb-empty-text" style={{marginTop:'12px'}}>Loading global shame...</div></div>
          ) : leaderboard.length === 0 ? (
            <div className="lb-empty"><div className="lb-empty-icon">🦗</div><div className="lb-empty-text">No entries yet. Go roast some code and add it here.</div></div>
          ) : (
            leaderboard.map((entry, i) => (
              <div key={entry.id} className={`lb-item rank-${i+1}`}>
                <div className={`lb-rank ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}`}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
                <div className="lb-info">
                  <div className="lb-name"><span className="lb-nick">{entry.nick || 'Anonymous Dev'}</span>{' — '}{entry.verdict}</div>
                  <div className="lb-snippet">{entry.lang?.toUpperCase()} · {entry.snippet}...</div>
                  <div className="lb-timestamp">{entry.dateStr || 'just now'}</div>
                </div>
                <div className="lb-score">
                  <div className={`lb-score-num ${entry.scoreClass}`}>{entry.score}</div>
                  <div className="lb-score-label">/100</div>
                </div>
              </div>
            ))
          )}
        </div>
      )}

      {tab === 'howto' && (
        <div className="how-section">
          <div className="section-heading">HOW IT WORKS</div>
          <div className="section-sub">FOUR TABS OF HUMILIATION</div>
          <div className="how-grid">
            {[
              {step:'01',title:'Paste Your Code',desc:'Drop any code snippet. Supports Python, JS, Java, C++, Go, Rust, PHP, Ruby, Swift, Kotlin. The worse it is, the better.'},
              {step:'02',title:'Get Destroyed',desc:'Our AI roasts every flaw — bad naming, O(n³) loops, hardcoded credentials, nested if-hell. Nothing escapes the roast.'},
              {step:'03',title:'Deep Analysis',desc:'Beyond the laughs: code description, quality metrics, time/space complexity, cognitive load score, and a full security scan.'},
              {step:'04',title:'Share The Shame',desc:'Generate a shareable roast card with your complexity scores, copy your report, or add to the global Hall of Shame leaderboard.'},
            ].map(c=>(
              <div key={c.step} className="how-card">
                <div className="how-step">{c.step}</div>
                <div className="how-card-title">{c.title}</div>
                <div className="how-card-desc">{c.desc}</div>
              </div>
            ))}
          </div>

          <hr className="divider" />
          <div className="section-heading">WHAT YOU GET</div>
          <div className="section-sub">FIVE ANALYSIS TABS</div>
          <div className="how-grid">
            {[
              {icon:'🔥',label:'Roast + Metrics',desc:'Savage comedian roast + readability, maintainability, performance, security, and testability scores out of 100.',color:'var(--fire)'},
              {icon:'📖',label:'Description',desc:'Plain-English explanation of what your code does, how it works, and what patterns it uses.',color:'var(--cyan)'},
              {icon:'📊',label:'Complexity Analysis',desc:'Big-O time and space complexity with explanation + cognitive load score from 1-10.',color:'var(--purple)'},
              {icon:'🔒',label:'Security Scan',desc:'Dedicated security vulnerability scan with critical/warning/info severity levels.',color:'var(--red)'},
              {icon:'🔧',label:'Fixes',desc:'Concrete actionable fixes with an improved code snippet showing what it should look like.',color:'var(--green)'},
            ].map(s=>(
              <div key={s.icon} className="how-card" style={{borderLeft:`3px solid ${s.color}`}}>
                <div style={{fontFamily:'var(--display)',fontSize:'36px',marginBottom:'8px'}}>{s.icon}</div>
                <div className="how-card-title">{s.label}</div>
                <div className="how-card-desc">{s.desc}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
